name: Generate Wiki Docs

on:
  push:
    branches:
      - master
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  gendoc:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Check out the main repository
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # 2️⃣ Check out the wiki repository into ./wiki
      - name: Check out wiki
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki

      # 3️⃣ Generate documentation
      - name: Generate documentation
        run: make gendoc

      # 4️⃣ Commit and push changes in ./wiki
      - name: Commit & Push wiki changes
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: "docs: update generated documentation"
          branch: master
          repository: wiki
